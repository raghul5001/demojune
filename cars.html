<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsche Cars</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #000;
}

.logo {
  font-weight: bold;
  letter-spacing: 2px;
}

.menu a {
  color: #fff;
  text-decoration: none;
  margin-left: 20px;
  font-size: 14px;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center/cover;
}

/* SECTION */
.section {
  padding: 50px 20px;
  max-width: 1200px;
  margin: auto;
}

/* TITLE */
.section h2 {
  margin-bottom: 30px;
}

/* GRID FIXED */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 15px;
}

.card p {
  margin: 0 15px 15px;
  font-size: 13px;
  color: #bbb;
}

.card:hover {
  transform: translateY(-5px);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #000;
  font-size: 12px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
  <div class="logo">PORSCHE</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Models</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->

<div class="hero"></div>

<!-- MODELS -->

<div class="section">
  <h2>Popular Models</h2>

  <div class="grid">
<div class="card">
  <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d">
  <h3>Porsche 911</h3>
  <p>Classic design with powerful performance.</p>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
  <h3>718 Cayman</h3>
  <p>Balanced mid-engine sports car.</p>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1617814076367-b759c7d7e738">
  <h3>Taycan</h3>
  <p>All-electric Porsche innovation.</p>
</div>

  </div>
</div>

<!-- FOOTER -->

<div class="footer">
  © 2026 Porsche
</div>

</body>
</html>
